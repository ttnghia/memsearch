# Run pytest across Python 3.10–3.13 on every push/PR to main

name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests with coverage
        run: uv run python -m pytest --cov --cov-report=term-missing

  opencode:
    name: OpenCode plugin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/opencode
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install --package-lock=false

      - name: Test package
        run: npm test

      - name: Check package entrypoint syntax
        run: |
          node --check index.ts
          node --check context.ts

      - name: Pack package
        run: npm pack --dry-run
